services:
  mysql:
    image: mysql:8.4
    container_name: mysql-dev
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./main/src/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql  # Adicione esta linha

volumes:
  mysql_data: