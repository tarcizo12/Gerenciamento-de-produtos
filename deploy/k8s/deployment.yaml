# =============================================================================
# deployment.yaml — App tarcizo/gerenciamento-produtos:1.0 (4 réplicas + NodePort) + MySQL (ClusterIP)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
  labels:
    app: api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"       
        prometheus.io/path: "/actuator/prometheus"  
    spec:
      containers:
        - name: api
          image: tarcizo/gerenciamento-produtos:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_HOST
              value: "mysql-svc"  
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: "mydatabase"
            - name: MYSQL_USER
              value: "myuser"
            - name: MYSQL_PASSWORD
              value: "secret"
          resources:
            requests:
              memory: "512Mi"    # 512 Megabytes (era 64Mi - 8x maior)
              cpu: "250m"        # 250 milicores (era 100m)
            limits:
              memory: "1Gi"      # 1 Gigabyte (era 128Mi - 8x maior)
              cpu: "500m"        # 500 milicores (era 250m)
          # Liveness Probe — reinicia o container se /health falhar
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          # Readiness Probe — só envia tráfego quando /ready responder OK
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

---
# Serviço NodePort — expõe a app fora do cluster
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080   # acesse em http://<NODE_IP>:30080

---
# =============================================================================
# MySQL — banco de dados (Pod + ClusterIP)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "verysecret"
            - name: MYSQL_DATABASE
              value: "mydatabase"
            - name: MYSQL_USER
              value: "myuser"
            - name: MYSQL_PASSWORD
              value: "secret"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# Serviço ClusterIP — MySQL acessível apenas dentro do cluster
# Sua app conecta usando o host: mysql-svc, porta: 3306
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306